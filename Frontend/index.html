<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>叮当装 - InstallFlow</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔔 叮当装 InstallFlow</h1>
            <p>一键批量安装 Mac 应用，让装机像叮当一样简单</p>
        </header>

        <main>
            <!-- 文件选择区域 -->
            <section class="file-selector-section">
                <div class="selector-wrapper">
                    <div id="dropZone" class="drop-zone">
                        <div class="drop-zone-content">
                            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <p class="drop-text">拖拽文件夹到这里</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 命令生成区域 -->
            <section id="commandSection" class="command-section" style="display: none;">
                <h2>🚀 生成的命令</h2>
                <div class="path-input-wrapper">
                    <label for="fullPath">完整路径：</label>
                    <input type="text" id="fullPath" class="path-input" placeholder="例如: /Users/fiber/Downloads/installers">
                    <p class="path-hint">请输入文件夹的完整路径</p>
                </div>
                <div id="commandDisplay" class="command-display"></div>
                <button id="copyBtn" class="copy-button">
                    <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    复制命令
                </button>
                <div id="copyNotification" class="copy-notification">✅ 已复制到剪贴板</div>
            </section>

            <!-- 使用说明 -->
            <section class="instructions">
                <h2>📖 使用说明</h2>
                <ol>
                    <li>拖拽包含安装包的文件夹到上方区域</li>
                    <li>在"完整路径"输入框中确认或修改文件夹的实际路径</li>
                    <li>点击"复制命令"按钮</li>
                    <li>在终端中粘贴并执行命令</li>
                </ol>
            </section>
        </main>

        <footer>
            <p>🔔 叮当装 InstallFlow - 让 Mac 装机更简单</p>
        </footer>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
